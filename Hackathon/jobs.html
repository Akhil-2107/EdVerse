<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Job Matches — EduVerse AI</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div class="bg-mesh"></div><div class="bg-grid"></div>
<div class="app-shell">
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main class="page-content page-enter">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px">
        <div><h1>💼 Job Matches</h1><p>AI-matched roles based on your current skills.</p></div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <select class="form-select" id="filter-match" onchange="renderJobs()" style="width:auto;padding:8px 32px 8px 12px">
            <option value="all">All Matches</option>
            <option value="high">Strong Match (75%+)</option>
            <option value="mid">Good Match (50%+)</option>
          </select>
          <select class="form-select" id="sort-by" onchange="renderJobs()" style="width:auto;padding:8px 32px 8px 12px">
            <option value="match">Sort: Best Match</option>
            <option value="salary">Sort: Highest Salary</option>
          </select>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 300px;gap:24px" class="responsive-grid-2">
        <div id="jobs-list" style="display:flex;flex-direction:column;gap:20px"></div>
        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="card">
            <div class="card-title" style="margin-bottom:16px">📊 Match Overview</div>
            <canvas id="match-donut"></canvas>
            <div id="match-legend" style="margin-top:16px;font-size:12px;display:flex;flex-direction:column;gap:8px"></div>
          </div>
          <div class="card">
            <div class="card-title" style="margin-bottom:12px">💡 Improve Your Match</div>
            <div id="improve-tips" style="font-size:13px;color:#94a3b8;line-height:1.7"></div>
          </div>
        </div>
      </div>

      <!-- Job Detail Modal -->
      <div class="modal-overlay" id="job-modal">
        <div class="modal" style="max-width:600px">
          <div class="modal-head">
            <h3 id="modal-title"></h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
          </div>
          <div class="modal-body" id="modal-body"></div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            <button class="btn btn-primary" onclick="EV.toast('Application submitted! 🎉', 'success');closeModal()">Apply Now 🚀</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="app.js"></script>
<script>
if (!EV.requireAuth()) throw 0;
const user = EV.getCurrentUser();
EV.renderSidebar(user.role);
EV.renderTopbar('Job Matches', user);

// Pre-compute match %
const jobsWithMatch = EV.jobs.map(j => ({
  ...j,
  match: EV.calcJobReadiness(user.skills, j.id)
})).sort((a,b) => b.match - a.match);

function renderJobs() {
  const filterVal = document.getElementById('filter-match').value;
  const sortVal = document.getElementById('sort-by').value;
  let list = [...jobsWithMatch];
  if (filterVal === 'high') list = list.filter(j => j.match >= 75);
  else if (filterVal === 'mid') list = list.filter(j => j.match >= 50);
  if (sortVal === 'salary') list.sort((a,b) => parseInt(b.salary) - parseInt(a.salary));

  document.getElementById('jobs-list').innerHTML = list.map(j => `
    <div class="card card-glow" style="cursor:pointer" onclick="openModal('${j.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="job-logo" style="background:${j.color}22;border-color:${j.color}33">${j.logo}</div>
          <div>
            <div class="job-title">${j.title}</div>
            <div class="job-company">${j.company} · ${j.location}</div>
          </div>
        </div>
        <div>
          <div class="${EV.matchClass(j.match)} job-match" style="margin-bottom:6px">${j.match}% Match</div>
          <div class="job-salary">${j.salary}</div>
        </div>
      </div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:16px">${j.description}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
        ${j.matchSkills.map(sk => {
          const v = user.skills[sk] || 0;
          const ok = v >= 70;
          return `<span class="badge" style="background:${ok?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};color:${ok?'#10b981':'#ef4444'};border:1px solid ${ok?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'}">
            ${ok?'✓':'✗'} ${EV.SKILL_LABELS[sk]||sk}
          </span>`;
        }).join('')}
      </div>
      <div class="job-footer">
        <div class="progress-bar" style="flex:1;margin-right:16px"><div class="progress-fill" style="width:${j.match}%;background:${j.color}"></div></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();EV.toast('Job saved! 📌','info')">Save</button>
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();EV.toast('Application submitted! 🎉','success')">Apply</button>
        </div>
      </div>
    </div>`).join('');
}
renderJobs();

// Donut chart
const high = jobsWithMatch.filter(j=>j.match>=75).length;
const mid = jobsWithMatch.filter(j=>j.match>=50&&j.match<75).length;
const low = jobsWithMatch.filter(j=>j.match<50).length;
EV.drawDonutChart('match-donut', [
  {value:high,color:'#10b981'},{value:mid,color:'#6366f1'},{value:low,color:'#ef4444'}
], {size:120, centerText:jobsWithMatch.length, centerLabel:'Jobs', centerFontSize:24});
document.getElementById('match-legend').innerHTML = [
  {label:`Strong (75%+)`,val:high,color:'#10b981'},
  {label:`Good (50–74%)`,val:mid,color:'#6366f1'},
  {label:`Developing`,val:low,color:'#ef4444'}
].map(l=>`<div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${l.color};flex-shrink:0"></div><span style="color:#94a3b8">${l.label}</span><span style="margin-left:auto;font-weight:700">${l.val}</span></div>`).join('');

// Tips
const weakest = Object.entries(user.skills).sort((a,b)=>a[1]-b[1]).slice(0,2).map(([k])=>EV.SKILL_LABELS[k]||k);
document.getElementById('improve-tips').innerHTML = `Focus on improving <strong>${weakest.join(' and ')}</strong> to significantly boost your match scores. These are the most in-demand skills across your target roles.`;

function openModal(id) {
  const job = EV.jobs.find(j=>j.id===id);
  if (!job) return;
  const match = jobsWithMatch.find(j=>j.id===id)?.match || 0;
  document.getElementById('modal-title').textContent = job.title + ' @ ' + job.company;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:16px;background:rgba(255,255,255,.03);border-radius:10px">
      <div style="font-size:2.5rem">${job.logo}</div>
      <div>
        <div style="font-weight:700;font-size:1rem">${job.company}</div>
        <div style="font-size:13px;color:#94a3b8">${job.location}</div>
        <div style="font-size:1rem;font-weight:800;color:#10b981;margin-top:4px">${job.salary}</div>
      </div>
      <div class="${EV.matchClass(match)} job-match" style="margin-left:auto">${match}% Match</div>
    </div>
    <p style="font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:20px">${job.description}</p>
    <div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:10px">REQUIREMENTS</div>
      ${job.requirements.map(r=>`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:#94a3b8"><span>→</span><span>${r}</span></div>`).join('')}
    </div>
    <div>
      <div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:10px">REQUIRED SKILLS</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${job.matchSkills.map(sk=>{const v=user.skills[sk]||0;const ok=v>=70;return`<span class="badge" style="background:${ok?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};color:${ok?'#10b981':'#ef4444'};border:1px solid ${ok?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'}">${ok?'✓':'✗'} ${EV.SKILL_LABELS[sk]||sk} ${v}%</span>`;}).join('')}
      </div>
    </div>`;
  document.getElementById('job-modal').classList.add('open');
}
function closeModal() { document.getElementById('job-modal').classList.remove('open'); }
document.getElementById('job-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
</script>
<style>@media(max-width:900px){.responsive-grid-2{grid-template-columns:1fr!important}}</style>
</body>
</html>
