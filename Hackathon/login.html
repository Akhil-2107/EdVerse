<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — EduVerse AI</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div class="bg-mesh"></div><div class="bg-grid"></div>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:420px">
    <div style="text-align:center;margin-bottom:40px">
      <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 16px;box-shadow:0 8px 24px rgba(99,102,241,.3)">🎓</div>
      <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:8px">Welcome back</h1>
      <p style="color:#94a3b8;font-size:13px">Sign in to your EduVerse AI account</p>
    </div>

    <!-- Quick Login -->
    <div class="card" style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">⚡ Quick Demo Login</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="quickLogin('akhil@eduverse.ai','demo123')">🧑‍💻 Learner</button>
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="quickLogin('emily@eduverse.ai','demo123')">👩‍🏫 Educator</button>
        <button class="btn btn-secondary btn-sm" style="flex:1" onclick="quickLogin('admin@eduverse.ai','admin123')">🛡️ Admin</button>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.06)"></div>
      <span style="font-size:12px;color:#64748b">or sign in manually</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.06)"></div>
    </div>

    <div class="card">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <div id="login-error" style="display:none;padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:13px;color:#ef4444;margin-bottom:16px"></div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px" id="login-btn">Sign In</button>
      </form>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:#64748b">
      Don't have an account? <a href="register.html" style="color:#6366f1;font-weight:600">Create one free →</a>
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Redirect if already logged in
  if (EV.isLoggedIn()) {
    const u = EV.getCurrentUser();
    location.href = u.role === 'educator' ? 'educator.html' : u.role === 'admin' ? 'admin.html' : 'dashboard.html';
  }

  function quickLogin(email, pw) {
    const user = EV.users.find(u => u.email === email && u.password === pw);
    if (!user) { showError('Invalid credentials'); return; }
    EV.setCurrentUser(user.id);
    EV.toast('Welcome back, ' + user.name + '! 🎉', 'success');
    setTimeout(() => {
      location.href = user.role === 'educator' ? 'educator.html' : user.role === 'admin' ? 'admin.html' : 'dashboard.html';
    }, 600);
  }

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const user = EV.users.find(u => u.email === email && u.password === pw);
    if (!user) { showError('Invalid email or password. Try a quick demo login above!'); return; }
    btn.textContent = 'Signing in…'; btn.disabled = true;
    EV.setCurrentUser(user.id);
    setTimeout(() => {
      location.href = user.role === 'educator' ? 'educator.html' : user.role === 'admin' ? 'admin.html' : 'dashboard.html';
    }, 700);
  });
</script>
</body>
</html>
